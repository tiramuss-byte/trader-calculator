<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор трейдера PRO</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #f9fafb; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: var(--text-light); transition: 0.3s; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: white; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9em; color: var(--text-light); }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1em; transition: 0.2s; }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 1em; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-success { background: var(--success); color: white; }
        .info-box { background: #eff6ff; border-left: 4px solid var(--primary); padding: 10px; margin-bottom: 15px; border-radius: 4px; font-size: 0.85em; color: #1e40af; }
        .result-box { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 20px; }
        .result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: var(--text-light); }
        .result-value { font-weight: 700; color: var(--text); }
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; cursor: pointer; }
        .checkbox-wrapper input { width: auto; margin: 0; }
        .hidden { display: none !important; }
        .order-item { background: #f9fafb; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .remove-order { position: absolute; top: 5px; right: 5px; background: #fee2e2; color: #ef4444; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .radio-group { display: flex; gap: 15px; margin-bottom: 15px; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f9fafb; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 Калькулятор трейдера</h1>
    </div>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('moex')">Мосбиржа</button>
        <button class="tab" onclick="switchTab('crypto')">Крипто</button>
        <button class="tab" onclick="switchTab('forex')">Forex</button>
        <button class="tab" onclick="switchTab('cb')">📈 Курс ЦБ РФ</button>
    </div>

    <!-- MOEX - ТОЧНО КАК В ТВОЁМ ФАЙЛЕ -->
    <div id="moex" class="tab-content active">
        <div class="row">
            <button class="btn btn-secondary" onclick="loadMOEXData()">📥 MOEX API</button>
            <button class="btn btn-secondary" onclick="toggleMoexSpecs()">✏️ Ред. спеки</button>
        </div>
        <div id="moex-specs" class="hidden" style="margin-top: 15px;">
            <div class="info-box">✏️ Параметры контракта</div>
            <div class="row">
                <div class="form-group"><label>Шаг цены</label><input type="number" id="m-step" value="0.0001" step="0.0001"></div>
                <div class="form-group"><label>Стоимость шага (₽)</label><input type="number" id="m-stepval" value="1"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Лот</label><input type="number" id="m-lot" value="1000"></div>
                <div class="form-group"><label>ГО (обеспечение)</label><input type="number" id="m-margin" value="18000"></div>
            </div>
            <button class="btn btn-primary" onclick="saveMoexSpecs()">Сохранить</button>
        </div>
        <div id="moex-info" class="result-box" style="margin-top: 15px;">
            <div class="result-row"><span class="result-label">Инструмент</span><span class="result-value" id="res-m-inst">EURRUB</span></div>
            <div class="result-row"><span class="result-label">Статус</span><span class="result-value" style="color: var(--success)">● Загружено</span></div>
        </div>
        <div style="margin-top: 20px;">
            <div class="row">
                <div class="form-group"><label>Депозит (₽)</label><input type="number" id="m-dep" value="100000"></div>
                <div class="form-group"><label>Риск (% от депозита)</label><input type="number" id="m-risk" value="1" step="0.1"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Цена входа</label><input type="number" id="m-entry" step="0.0001"></div>
                <div class="form-group"><label>Стоп-лосс</label><input type="number" id="m-sl" step="0.0001"></div>
            </div>
            <div class="form-group"><label>Тейк-профит (опционально)</label><input type="number" id="m-tp" step="0.0001"></div>
            <button class="btn btn-primary" onclick="calcMoex()">Рассчитать позицию</button>
        </div>
        <div id="m-result" class="result-box hidden"></div>
    </div>

    <!-- CRYPTO - ТОЧНО КАК В ТВОЁМ ФАЙЛЕ -->
    <div id="crypto" class="tab-content">
        <div class="form-group"><label>Инструмент</label><select id="c-pair"><option>BTC/USDT</option><option>ETH/USDT</option><option>SOL/USDT</option></select></div>
        <div class="row">
            <div class="form-group"><label>Депозит (USDT)</label><input type="number" id="c-dep" value="1000"></div>
            <div class="form-group"><label>Риск (% от депозита)</label><input type="number" id="c-risk" value="1" step="0.1"></div>
        </div>
        <div class="row">
            <div class="form-group"><label>Вход</label><input type="number" id="c-entry"></div>
            <div class="form-group"><label>Стоп</label><input type="number" id="c-sl"></div>
        </div>
        <div class="form-group"><label>Тейк-профит</label><input type="number" id="c-tp"></div>
        <div class="row">
            <div class="form-group"><label>Плечо</label><select id="c-lever"><option>1x</option><option>5x</option><option>10x</option><option>20x</option><option>50x</option><option>100x</option></select></div>
        </div>
        <button class="btn btn-primary" onclick="calcCrypto()">Рассчитать</button>
        <div id="c-result" class="result-box hidden"></div>
    </div>

    <!-- FOREX -->
    <div id="forex" class="tab-content">
        <div class="tabs" style="border-bottom: none; margin-bottom: 10px;">
            <button class="tab active" onclick="switchForexSub('f-classic')">📈 Классический</button>
            <button class="tab" onclick="switchForexSub('f-grid')">🕸️ Сеточная торговля</button>
        </div>

        <!-- FOREX CLASSIC -->
        <div id="f-classic" class="tab-content active" style="padding: 0;">
            <div class="info-box" id="fx-info-msg">💡 Standard: 1 лот = 100 000 ед. | Пункт ≈ $1.00</div>
            
            <div class="row">
                <div class="form-group">
                    <label>Брокер</label>
                    <select id="fx-broker" onchange="updateFxSettings()">
                        <option value="robo">RoboForex</option>
                        <option value="bcs">БКС Форекс</option>
                        <option value="custom">Custom</option>
                        <option value="ecn">ECN / Prime</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Тип счёта</label>
                    <select id="fx-acc-type" onchange="updateFxSettings()">
                        <option value="std">Standard</option>
                        <option value="cent">ProCent</option>
                    </select>
                </div>
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="fx-swapfree" onchange="toggleSwapFree()">
                <label for="fx-swapfree">☑ Swap-Free (валюты + металлы)</label>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Пара / Инструмент</label>
                    <select id="fx-pair" onchange="updateFxSettings()">
                        <option value="EURUSD">EURUSD</option>
                        <option value="GBPUSD">GBPUSD</option>
                        <option value="USDJPY">USDJPY</option>
                        <option value="XAUUSD">XAUUSD (Gold)</option>
                        <option value="XAGUSD">XAGUSD (Silver)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Валюта счёта</label>
                    <select id="fx-currency">
                        <option value="USD">USD</option>
                        <option value="RUB">RUB</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Направление</label>
                    <select id="fx-dir"><option value="long">Long </option><option value="short">Short 📉</option></select>
                </div>
                <div class="form-group">
                    <label>Депозит ($)</label>
                    <input type="number" id="fx-dep" value="2000">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Риск (% от депозита)</label>
                    <input type="number" id="fx-risk" value="1" step="0.1">
                </div>
                <div class="form-group">
                    <label>Плечо (1:)</label>
                    <input type="number" id="fx-lever" value="100">
                </div>
            </div>

            <div class="form-group"><label>Цена входа</label><input type="number" id="fx-entry" step="0.00001"></div>

            <!-- НОВОЕ: ЧЕКБОКС ДЛЯ РАСЧЁТА В ПУНКТАХ -->
            <div class="checkbox-wrapper">
                <input type="checkbox" id="fx-use-points" onchange="toggleFxPointsInput()">
                <label for="fx-use-points">📏 Рассчитывать SL/TP в пунктах от цены входа</label>
            </div>

            <!-- ПОЛЯ ДЛЯ ЦЕН -->
            <div id="fx-price-inputs">
                <div class="row">
                    <div class="form-group"><label>Стоп-лосс (Цена)</label><input type="number" id="fx-sl-price" step="0.00001"></div>
                    <div class="form-group"><label>Тейк-профит (Цена)</label><input type="number" id="fx-tp-price" step="0.00001"></div>
                </div>
            </div>

            <!-- ПОЛЯ ДЛЯ ПУНКТОВ (скрыты) -->
            <div id="fx-points-inputs" class="hidden">
                <div class="row">
                    <div class="form-group"><label>Расстояние до SL (пункты)</label><input type="number" id="fx-sl-points" placeholder="50"></div>
                    <div class="form-group"><label>Расстояние до TP (пункты)</label><input type="number" id="fx-tp-points" placeholder="100"></div>
                </div>
            </div>

            <div class="row">
                <div class="form-group"><label>Срок удержания (ночей)</label><input type="number" id="fx-nights" value="1"></div>
                <div class="form-group">
                    <div class="checkbox-wrapper" style="margin:0; margin-top: 25px;">
                        <input type="checkbox" id="fx-triple-swap">
                        <label for="fx-triple-swap">Учитывать тройной своп (среда)</label>
                    </div>
                </div>
            </div>

            <div class="info-box" style="margin-top: 10px;">📥 Спред и комиссия</div>
            <div class="row">
                <div class="form-group"><label>Спред (пипсы)</label><input type="number" id="fx-spread" value="0" step="0.1"></div>
                <div class="form-group"><label>Комиссия ($/лот)</label><input type="number" id="fx-comm" value="0" step="0.1"></div>
            </div>

            <button class="btn btn-primary" onclick="calcFxClassic()">Рассчитать позицию</button>
            <div id="fx-classic-result" class="result-box hidden"></div>
        </div>

        <!-- FOREX GRID -->
        <div id="f-grid" class="tab-content" style="padding: 0;">
            <div class="info-box" id="fx-grid-info">💡 ProCent: 1 лот = 1 000 ед. | Пункт ≈ $0.01</div>
            
            <div class="row">
                <div class="form-group"><label>Пара</label><select id="g-pair"><option>EURUSD</option><option>XAUUSD</option></select></div>
                <div class="form-group"><label>Депозит ($)</label><input type="number" id="g-dep" value="2000"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Риск (%)</label><input type="number" id="g-risk" value="2" step="0.1"></div>
                <div class="form-group"><label>Направление</label><select id="g-dir"><option value="buy">Long 📈</option><option value="sell">Short 📉</option></select></div>
            </div>

            <!-- НОВОЕ: ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМОВ -->
            <div class="form-group">
                <label>Режим расчёта:</label>
                <div class="radio-group">
                    <label><input type="radio" name="grid-mode" value="coef" checked onchange="toggleGridMode()">  По коэффициенту</label>
                    <label><input type="radio" name="grid-mode" value="budget" onchange="toggleGridMode()"> 🔹 По общему риску</label>
                </div>
            </div>

            <!-- ПОЛЯ ДЛЯ СТАРОГО РЕЖИМА -->
            <div id="grid-coef-fields">
                <div class="row">
                    <div class="form-group"><label>Стоп-лосс сетки (пипсы)</label><input type="number" id="g-sl-pips" value="50"></div>
                    <div class="form-group"><label>Коэффициент (сумма)</label><input type="number" id="g-coef" value="1" step="0.1"></div>
                </div>
            </div>

            <!-- ПОЛЯ ДЛЯ НОВОГО РЕЖИМА -->
            <div id="grid-budget-fields" class="hidden">
                <div class="row">
                    <div class="form-group"><label>Шаг стопа от посл. уровня ($)</label><input type="number" id="g-sl-step" value="10" step="0.01"></div>
                    <div class="form-group"><label>Бюджет риска ($)</label><input type="number" id="g-budget" value="40" step="1"></div>
                </div>
            </div>

            <div class="row">
                <div class="form-group"><label>Цена входа (Базовый)</label><input type="number" id="g-entry" step="0.00001"></div>
                <div class="form-group"><label>Шаг сетки (пипсы)</label><input type="number" id="g-step" value="10"></div>
            </div>

            <div id="g-orders-list"></div>
            <button class="btn btn-secondary" onclick="addGridOrder()">➕ Добавить ордер</button>

            <div class="row" style="margin-top: 15px;">
                <div class="form-group"><label>Своп Long ($)</label><input type="number" id="g-swap-l" value="0" step="0.01"></div>
                <div class="form-group"><label>Своп Short ($)</label><input type="number" id="g-swap-s" value="0" step="0.01"></div>
            </div>

            <button class="btn btn-primary" onclick="calcFxGrid()">📊 Рассчитать сетку</button>
            <button class="btn btn-success" onclick="exportGridToSet()" style="margin-top: 5px;">📤 Экспорт в .set файл</button>
            
            <div id="g-result" class="result-box hidden"></div>
        </div>
    </div>

    <!-- CB RATE -->
    <div id="cb" class="tab-content">
        <div class="info-box">📈 Официальный курс ЦБ РФ</div>
        <button class="btn btn-primary" onclick="loadCBRate()">Загрузить курс</button>
        <div id="cb-result" class="result-box hidden" style="margin-top: 15px;"></div>
    </div>

</div>

<script>
    // --- TABS ---
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs > .tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }
    function switchForexSub(id) {
        document.querySelectorAll('#forex .tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('#forex .tabs > .tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    // --- FOREX CLASSIC ---
    function toggleFxPointsInput() {
        const usePoints = document.getElementById('fx-use-points').checked;
        document.getElementById('fx-price-inputs').classList.toggle('hidden', usePoints);
        document.getElementById('fx-points-inputs').classList.toggle('hidden', !usePoints);
    }

    function updateFxSettings() {
        const acc = document.getElementById('fx-acc-type').value;
        const info = document.getElementById('fx-info-msg');
        const gridInfo = document.getElementById('fx-grid-info');
        if (acc === 'cent') {
            info.innerHTML = '💡 ProCent: 1 лот = 1 000 ед. | Пункт ≈ $0.01';
            gridInfo.innerHTML = '💡 ProCent: 1 лот = 1 000 ед. | Пункт ≈ $0.01';
        } else {
            info.innerHTML = '💡 Standard: 1 лот = 100 000 ед. | Пункт ≈ $1.00';
            gridInfo.innerHTML = '💡 Standard: 1 лот = 100 000 ед. | Пункт ≈ $1.00';
        }
    }

    function calcFxClassic() {
        const dep = parseFloat(document.getElementById('fx-dep').value);
        const riskPct = parseFloat(document.getElementById('fx-risk').value);
        const entry = parseFloat(document.getElementById('fx-entry').value);
        const pair = document.getElementById('fx-pair').value;
        const dir = document.getElementById('fx-dir').value;
        const acc = document.getElementById('fx-acc-type').value;
        const lever = parseFloat(document.getElementById('fx-lever').value);
        
        let sl, tp;
        if (document.getElementById('fx-use-points').checked) {
            const slPts = parseFloat(document.getElementById('fx-sl-points').value);
            const tpPts = parseFloat(document.getElementById('fx-tp-points').value);
            const ptVal = (pair.includes('JPY') || pair.includes('XAU') || pair.includes('XAG')) ? 0.01 : 0.0001;
            if (dir === 'long') {
                sl = entry - (slPts * ptVal);
                tp = entry + (tpPts * ptVal);
            } else {
                sl = entry + (slPts * ptVal);
                tp = entry - (tpPts * ptVal);
            }
        } else {
            sl = parseFloat(document.getElementById('fx-sl-price').value);
            tp = parseFloat(document.getElementById('fx-tp-price').value);
        }

        if (!entry || !sl) return alert('Заполните Вход и SL!');
        const dist = Math.abs(entry - sl);
        const riskAmt = dep * (riskPct / 100);
        const contractSize = acc === 'cent' ? 1000 : 100000;
        const pointVal = (pair.includes('JPY') || pair.includes('XAU')) ? 0.01 : 0.00001;
        const lot = riskAmt / (dist / pointVal); 
        const margin = (lot * contractSize * entry) / lever;

        const res = document.getElementById('fx-classic-result');
        res.classList.remove('hidden');
        res.innerHTML = `
            <div class="result-row"><span>Размер позиции</span><span class="result-value">${lot.toFixed(2)} лот</span></div>
            <div class="result-row"><span>Стоп-лосс</span><span class="result-value">${sl.toFixed(5)}</span></div>
            <div class="result-row"><span>Тейк-профит</span><span class="result-value">${tp ? tp.toFixed(5) : '-'}</span></div>
            <div class="result-row"><span>Риск ($)</span><span class="result-value">$${riskAmt.toFixed(2)}</span></div>
            <div class="result-row"><span>Маржа</span><span class="result-value">$${margin.toFixed(2)}</span></div>
        `;
    }

    // --- FOREX GRID ---
    function toggleGridMode() {
        const mode = document.querySelector('input[name="grid-mode"]:checked').value;
        document.getElementById('grid-coef-fields').classList.toggle('hidden', mode !== 'coef');
        document.getElementById('grid-budget-fields').classList.toggle('hidden', mode !== 'budget');
    }

    let gridOrders = [];
    function addGridOrder() {
        const list = document.getElementById('g-orders-list');
        const idx = gridOrders.length + 1;
        gridOrders.push({ idx });
        const div = document.createElement('div');
        div.className = 'order-item';
        div.id = `g-ord-${idx}`;
        div.innerHTML = `
            <button class="remove-order" onclick="removeGridOrder(${idx})">×</button>
            <div class="row">
                <div class="form-group"><label>Цена входа #${idx}</label><input type="number" class="g-price" step="0.00001"></div>
                <div class="form-group"><label>TP #${idx}</label><input type="number" class="g-tp" step="0.00001"></div>
            </div>
        `;
        list.appendChild(div);
    }
    function removeGridOrder(idx) {
        document.getElementById(`g-ord-${idx}`).remove();
    }

    function calcFxGrid() {
        const mode = document.querySelector('input[name="grid-mode"]:checked').value;
        const prices = Array.from(document.querySelectorAll('.g-price')).map(i => parseFloat(i.value)).filter(v => v);
        const tps = Array.from(document.querySelectorAll('.g-tp')).map(i => parseFloat(i.value));
        const dir = document.getElementById('g-dir').value;
        
        if (prices.length === 0) return alert('Добавьте ордера!');

        let gridSL, totalRisk = 0, lots = [];

        if (mode === 'coef') {
            const slPips = parseFloat(document.getElementById('g-sl-pips').value);
            const coef = parseFloat(document.getElementById('g-coef').value);
            gridSL = prices[0] - (slPips * 0.0001); 
            lots = prices.map((_, i) => 0.01 * (i + 1) * coef);
        } else {
            const step = parseFloat(document.getElementById('g-sl-step').value);
            const budget = parseFloat(document.getElementById('g-budget').value);
            const lastPrice = prices[prices.length - 1];
            gridSL = dir === 'buy' ? lastPrice - step : lastPrice + step;
            let rawRisk = 0;
            const dists = prices.map(p => Math.abs(p - gridSL));
            const baseLot = 0.01;
            dists.forEach(d => rawRisk += baseLot * d * 100); 
            const scale = budget / rawRisk;
            lots = dists.map(d => {
                const l = (baseLot * scale);
                totalRisk += l * d * 100;
                return l;
            });
        }

        const res = document.getElementById('g-result');
        res.classList.remove('hidden');
        let html = `<table><tr><th>#</th><th>Цена</th><th>Лот</th><th>SL</th><th>TP</th></tr>`;
        prices.forEach((p, i) => {
            html += `<tr><td>${i+1}</td><td>${p.toFixed(5)}</td><td>${lots[i].toFixed(2)}</td><td>${gridSL.toFixed(5)}</td><td>${tps[i] ? tps[i].toFixed(5) : '-'}</td></tr>`;
        });
        html += `</table>`;
        html += `<div class="result-row" style="margin-top:10px"><span>Grid SL</span><span class="result-value">${gridSL.toFixed(5)}</span></div>`;
        if (mode === 'budget') html += `<div class="result-row"><span>Итоговый риск</span><span class="result-value">$${totalRisk.toFixed(2)}</span></div>`;
        res.innerHTML = html;
        window.gridExportData = { prices, lots, tps, gridSL, dir };
    }

    function exportGridToSet() {
        if (!window.gridExportData) return alert('Сначала рассчитайте сетку!');
        const d = window.gridExportData;
        let txt = `InpMagic=20240528\nInpDirection=${d.dir === 'buy' ? 'ORDER_TYPE_BUY' : 'ORDER_TYPE_SELL'}\nInpTotalLevels=${d.prices.length}\n`;
        d.prices.forEach((p, i) => {
            txt += `Price${i+1}=${p}\nLot${i+1}=${d.lots[i].toFixed(2)}\nSL${i+1}=${d.gridSL}\nTP${i+1}=${d.tps[i] || d.gridSL}\n`;
        });
        const blob = new Blob([txt], {type: "text/plain"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "GridBot_Settings.set";
        a.click();
    }

    window.onload = function() {
        addGridOrder(); addGridOrder(); addGridOrder();
        updateFxSettings();
    };
</script>
