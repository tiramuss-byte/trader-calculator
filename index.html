<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор трейдера PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #e9ecef; }
        .tab { flex: 1; padding: 15px; background: none; border: none; cursor: pointer; font-size: 16px; font-weight: 600; color: #6c757d; transition: all 0.3s; }
        .tab:hover { background: #e9ecef; }
        .tab.active { background: white; color: #667eea; border-bottom: 3px solid #667eea; }
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #495057; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 15px; transition: border 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; }
        .result { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .result-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e9ecef; }
        .result-item:last-child { border-bottom: none; }
        .result-label { font-weight: 600; color: #6c757d; }
        .result-value { font-weight: 700; color: #667eea; }
        .info { background: #e7f3ff; border-left: 4px solid #2196F3; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 14px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background: #f8f9fa; font-weight: 600; color: #495057; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .checkbox-wrapper input[type="checkbox"] { width: auto; }
        .radio-group { display: flex; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
        .radio-group input[type="radio"] { width: auto; }
        @media (max-width: 768px) { .row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Калькулятор трейдера</h1>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('moex')">Мосбиржа</button>
            <button class="tab" onclick="switchTab('crypto')">Крипто</button>
            <button class="tab" onclick="switchTab('forex')">Forex</button>
        </div>

        <!-- MOEX TAB - БЕЗ ИЗМЕНЕНИЙ -->
        <div id="moex" class="tab-content active">
            <div class="info">💡 Standard: 1 лот = 100 000 ед. | Пункт ≈ $1.00</div>
            <div class="form-group">
                <label>Инструмент</label>
                <select id="moexSymbol"><option>EURRUB</option><option>USDRUB</option><option>GBPRUB</option></select>
            </div>
            <div class="row">
                <div class="form-group"><label>Депозит (₽)</label><input type="number" id="moexDeposit" value="100000"></div>
                <div class="form-group"><label>Риск (%)</label><input type="number" id="moexRisk" value="1" step="0.1"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Цена входа</label><input type="number" id="moexEntry" step="0.0001"></div>
                <div class="form-group"><label>Стоп-лосс</label><input type="number" id="moexSL" step="0.0001"></div>
            </div>
            <button class="btn" onclick="calculateMOEX()">Рассчитать позицию</button>
            <div id="moexResult" class="result"></div>
        </div>

        <!-- CRYPTO TAB - БЕЗ ИЗМЕНЕНИЙ -->
        <div id="crypto" class="tab-content">
            <div class="info">💡 ProCent: 1 лот = 1 000 ед. | Пункт ≈ $0.01</div>
            <div class="form-group">
                <label>Пара</label>
                <select id="cryptoPair"><option>BTC/USDT</option><option>ETH/USDT</option></select>
            </div>
            <div class="row">
                <div class="form-group"><label>Депозит (USDT)</label><input type="number" id="cryptoDeposit" value="1000"></div>
                <div class="form-group"><label>Риск (%)</label><input type="number" id="cryptoRisk" value="1" step="0.1"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Вход</label><input type="number" id="cryptoEntry" step="0.01"></div>
                <div class="form-group"><label>Стоп</label><input type="number" id="cryptoSL" step="0.01"></div>
            </div>
            <button class="btn" onclick="calculateCrypto()">Рассчитать</button>
            <div id="cryptoResult" class="result"></div>
        </div>

        <!-- FOREX TAB -->
        <div id="forex" class="tab-content">
            <div class="tabs">
                <button class="tab active" onclick="switchForexTab('classic')">📈 Классический</button>
                <button class="tab" onclick="switchForexTab('grid')">🕸️ Сеточная</button>
            </div>

            <!-- CLASSIC FOREX -->
            <div id="forex-classic" class="tab-content active">
                <div class="info">💡 Standard: 1 лот = 100 000 ед. | Пункт ≈ $1.00</div>
                
                <div class="form-group">
                    <label>Пара / Инструмент</label>
                    <select id="forexPair">
                        <option>EURUSD</option>
                        <option>GBPUSD</option>
                        <option>USDJPY</option>
                        <option>XAUUSD</option>
                        <option>XAGUSD</option>
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Направление</label>
                        <select id="forexDirection">
                            <option value="BUY">Long 📈</option>
                            <option value="SELL">Short 📉</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Депозит ($)</label>
                        <input type="number" id="forexDeposit" value="2000">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Риск (%)</label>
                        <input type="number" id="forexRisk" value="2" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Плечо (1:)</label>
                        <input type="number" id="forexLeverage" value="100">
                    </div>
                </div>

                <div class="form-group">
                    <label>Цена входа</label>
                    <input type="number" id="forexEntry" step="0.00001">
                </div>

                <!-- НОВОЕ: ЧЕКБОКС ДЛЯ ПУНКТОВ -->
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="usePointsToggle" onchange="togglePointsInput()">
                    <label for="usePointsToggle" style="margin:0; cursor:pointer;">Рассчитывать SL/TP в пунктах от цены входа</label>
                </div>

                <!-- ПОЛЯ ДЛЯ ЦЕН (по умолчанию видны) -->
                <div id="forexPriceInputs">
                    <div class="row">
                        <div class="form-group">
                            <label>Стоп-лосс (цена)</label>
                            <input type="number" id="forexSLPrice" step="0.00001">
                        </div>
                        <div class="form-group">
                            <label>Тейк-профит (цена, опционально)</label>
                            <input type="number" id="forexTPPrice" step="0.00001">
                        </div>
                    </div>
                </div>

                <!-- ПОЛЯ ДЛЯ ПУНКТОВ (скрыты по умолчанию) -->
                <div id="forexPointsInputs" style="display:none;">
                    <div class="row">
                        <div class="form-group">
                            <label>Расстояние до SL (пункты)</label>
                            <input type="number" id="forexSLPoints" step="0.01" placeholder="Например: 50">
                        </div>
                        <div class="form-group">
                            <label>Расстояние до TP (пункты)</label>
                            <input type="number" id="forexTPPoints" step="0.01" placeholder="Например: 100">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Срок удержания (ночей)</label>
                    <input type="number" id="forexNights" value="1">
                </div>

                <button class="btn" onclick="calculateForexClassic()">Рассчитать позицию</button>
                <div id="forexClassicResult" class="result"></div>
            </div>

            <!-- GRID FOREX -->
            <div id="forex-grid" class="tab-content">
                <div class="info">💡 ProCent: 1 лот = 1 000 ед. | Пункт ≈ $0.01</div>
                
                <div class="form-group">
                    <label>Пара</label>
                    <select id="gridPair">
                        <option>EURUSD</option>
                        <option>GBPUSD</option>
                        <option>XAUUSD</option>
                        <option>XAGUSD</option>
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Направление</label>
                        <select id="gridDirection">
                            <option value="BUY">Long 📈</option>
                            <option value="SELL">Short 📉</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Депозит ($)</label>
                        <input type="number" id="gridDeposit" value="2000">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Риск (%)</label>
                        <input type="number" id="gridRisk" value="2" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Плечо (1:)</label>
                        <input type="number" id="gridLeverage" value="100">
                    </div>
                </div>

                <!-- НОВОЕ: ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМОВ -->
                <div class="form-group">
                    <label>Режим расчёта сетки:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gridMode" value="coefficient" checked onchange="toggleGridMode()">
                            🔹 По коэффициенту (старый режим)
                        </label>
                        <label>
                            <input type="radio" name="gridMode" value="budget" onchange="toggleGridMode()">
                            🔹 По общему риску (новый режим)
                        </label>
                    </div>
                </div>

                <!-- Поля для режима "по коэффициенту" (старые) -->
                <div id="coefficientFields">
                    <div class="row">
                        <div class="form-group">
                            <label>Коэффициент (сумма)</label>
                            <input type="number" id="gridCoefficient" value="1" step="0.1">
                        </div>
                    </div>
                </div>

                <!-- Поля для режима "по бюджету" (НОВЫЕ) -->
                <div id="budgetFields" style="display:none;">
                    <div class="row">
                        <div class="form-group">
                            <label>Шаг стопа от последнего уровня ($)</label>
                            <input type="number" id="gridSlStep" value="10" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Бюджет риска ($)</label>
                            <input type="number" id="gridRiskBudget" value="40" step="0.01">
                        </div>
                    </div>
                </div>

                <div id="gridLevelsContainer">
                    <h3>Уровни сетки</h3>
                    <div id="gridLevels"></div>
                    <button type="button" class="btn btn-secondary" onclick="addGridLevel()">➕ Добавить уровень</button>
                </div>

                <button class="btn" onclick="calculateGrid()">📊 Рассчитать сетку</button>
                <button class="btn" onclick="exportToSet()">📤 Экспорт в .set файл</button>
                
                <div id="gridResult" class="result"></div>
            </div>
        </div>
    </div>

    <script>
        // ТАБЫ
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        function switchForexTab(type) {
            document.querySelectorAll('#forex .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#forex .tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('forex-' + type).classList.add('active');
        }

        // НОВАЯ ФУНКЦИЯ: ПЕРЕКЛЮЧЕНИЕ ПУНКТЫ/ЦЕНЫ
        function togglePointsInput() {
            const usePoints = document.getElementById('usePointsToggle').checked;
            document.getElementById('forexPriceInputs').style.display = usePoints ? 'none' : 'block';
            document.getElementById('forexPointsInputs').style.display = usePoints ? 'block' : 'none';
        }

        // НОВАЯ ФУНКЦИЯ: ПЕРЕКЛЮЧЕНИЕ РЕЖИМА СЕТКИ
        function toggleGridMode() {
            const mode = document.querySelector('input[name="gridMode"]:checked').value;
            document.getElementById('coefficientFields').style.display = mode === 'coefficient' ? 'block' : 'none';
            document.getElementById('budgetFields').style.display = mode === 'budget' ? 'block' : 'none';
        }

        // РАСЧЁТ КЛАССИКИ FOREX (ОБНОВЛЁННЫЙ)
        function calculateForexClassic() {
            const pair = document.getElementById('forexPair').value;
            const direction = document.getElementById('forexDirection').value;
            const deposit = parseFloat(document.getElementById('forexDeposit').value);
            const riskPercent = parseFloat(document.getElementById('forexRisk').value);
            const entry = parseFloat(document.getElementById('forexEntry').value);
            const leverage = parseFloat(document.getElementById('forexLeverage').value);
            const usePoints = document.getElementById('usePointsToggle').checked;
            
            let slPrice, tpPrice;
            
            if (usePoints) {
                const slPoints = parseFloat(document.getElementById('forexSLPoints').value) || 0;
                const tpPoints = parseFloat(document.getElementById('forexTPPoints').value) || 0;
                const pointValue = (pair.includes('XAU') || pair.includes('XAG')) ? 0.01 : 0.0001;
                
                if (direction === 'BUY') {
                    slPrice = entry - (slPoints * pointValue);
                    tpPrice = entry + (tpPoints * pointValue);
                } else {
                    slPrice = entry + (slPoints * pointValue);
                    tpPrice = entry - (tpPoints * pointValue);
                }
            } else {
                slPrice = parseFloat(document.getElementById('forexSLPrice').value);
                tpPrice = parseFloat(document.getElementById('forexTPPrice').value);
            }
            
            const riskAmount = deposit * (riskPercent / 100);
            const slDistance = Math.abs(entry - slPrice);
            const contractSize = 100000;
            const pointValue = (pair.includes('XAU') || pair.includes('XAG')) ? 0.01 : 0.00001;
            const tickValue = 1;
            
            const lot = riskAmount / (slDistance / pointValue * tickValue);
            const positionSize = lot * contractSize;
            const margin = positionSize / leverage;
            
            const result = `
                <div class="result-item"><span class="result-label">Размер позиции:</span><span class="result-value">${lot.toFixed(2)} лот</span></div>
                <div class="result-item"><span class="result-label">Стоп-лосс:</span><span class="result-value">${slPrice.toFixed(5)}</span></div>
                <div class="result-item"><span class="result-label">Тейк-профит:</span><span class="result-value">${tpPrice ? tpPrice.toFixed(5) : 'не указан'}</span></div>
                <div class="result-item"><span class="result-label">Риск:</span><span class="result-value">$${riskAmount.toFixed(2)}</span></div>
                <div class="result-item"><span class="result-label">Маржа:</span><span class="result-value">$${margin.toFixed(2)}</span></div>
            `;
            
            document.getElementById('forexClassicResult').innerHTML = result;
        }

        // СЕТКА: ДОБАВИТЬ УРОВЕНЬ
        let gridLevelCount = 0;
        function addGridLevel() {
            gridLevelCount++;
            const container = document.getElementById('gridLevels');
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `
                <label>Уровень ${gridLevelCount}</label>
                <div class="row">
                    <input type="number" class="gridLevelPrice" placeholder="Цена входа" step="0.00001">
                    <input type="number" class="gridLevelTP" placeholder="TP" step="0.00001">
                </div>
            `;
            container.appendChild(div);
        }

        // СЕТКА: РАСЧЁТ (ОБНОВЛЁННЫЙ С ДВУМЯ РЕЖИМАМИ)
        function calculateGrid() {
            const deposit = parseFloat(document.getElementById('gridDeposit').value);
            const riskPercent = parseFloat(document.getElementById('gridRisk').value);
            const direction = document.getElementById('gridDirection').value;
            const mode = document.querySelector('input[name="gridMode"]:checked').value;
            
            const prices = Array.from(document.querySelectorAll('.gridLevelPrice')).map(input => parseFloat(input.value));
            const tps = Array.from(document.querySelectorAll('.gridLevelTP')).map(input => parseFloat(input.value));
            
            if (prices.length === 0) {
                alert('Добавьте хотя бы один уровень!');
                return;
            }
            
            let totalRisk = 0;
            let levelsData = [];
            let gridSL = 0;
            
            if (mode === 'coefficient') {
                // СТАРЫЙ РЕЖИМ (по коэффициенту)
                const coefficient = parseFloat(document.getElementById('gridCoefficient').value);
                const riskPerUnit = riskPercent / coefficient;
                
                for (let i = 0; i < prices.length; i++) {
                    const lot = 0.01 * (i + 1);
                    const risk = lot * riskPerUnit * 100;
                    totalRisk += risk;
                    levelsData.push({ price: prices[i], tp: tps[i], lot, risk });
                }
                gridSL = prices[prices.length - 1] - 0.50; // Примерный SL
            } else {
                // НОВЫЙ РЕЖИМ (по бюджету риска)
                const slStep = parseFloat(document.getElementById('gridSlStep').value);
                const budget = parseFloat(document.getElementById('gridRiskBudget').value);
                
                // Расчёт Grid SL от последнего уровня
                const lastPrice = prices[prices.length - 1];
                gridSL = direction === 'BUY' ? lastPrice - slStep : lastPrice + slStep;
                
                // Расчёт лотов и рисков
                let rawTotalRisk = 0;
                for (let i = 0; i < prices.length; i++) {
                    const dist = Math.abs(prices[i] - gridSL);
                    const baseLot = 0.01;
                    const risk = baseLot * dist * 100; // Для XAUUSD множитель 100
                    
                    rawTotalRisk += risk;
                    levelsData.push({ price: prices[i], tp: tps[i], lot: baseLot, risk, dist });
                }
                
                // Масштабирование под бюджет
                if (rawTotalRisk > budget) {
                    const scale = budget / rawTotalRisk;
                    levelsData.forEach(lvl => {
                        lvl.lot = parseFloat((lvl.lot * scale).toFixed(2));
                        lvl.risk = lvl.lot * lvl.dist * 100;
                    });
                    totalRisk = levelsData.reduce((sum, l) => sum + l.risk, 0);
                } else {
                    totalRisk = rawTotalRisk;
                }
            }
            
            // Вывод таблицы
            let table = '<table><tr><th>#</th><th>Цена</th><th>Лот</th><th>SL</th><th>TP</th><th>Риск</th></tr>';
            levelsData.forEach((lvl, i) => {
                table += `<tr>
                    <td>${i+1}</td>
                    <td>${lvl.price.toFixed(5)}</td>
                    <td>${lvl.lot.toFixed(2)}</td>
                    <td>${gridSL.toFixed(5)}</td>
                    <td>${lvl.tp ? lvl.tp.toFixed(5) : '-'}</td>
                    <td>$${lvl.risk.toFixed(2)}</td>
                </tr>`;
            });
            table += '</table>';
            
            const budget = mode === 'budget' ? parseFloat(document.getElementById('gridRiskBudget').value) : null;
            const riskWarning = budget && totalRisk > budget ? '⚠️ Превышает бюджет!' : '✅';
            
            const result = `
                <h3>📋 Ордера сетки</h3>
                ${table}
                <div class="result-item"><span class="result-label">Общий стоп-лосс:</span><span class="result-value">${gridSL.toFixed(5)}</span></div>
                <div class="result-item"><span class="result-label">Общий риск:</span><span class="result-value">$${totalRisk.toFixed(2)} ${riskWarning}</span></div>
            `;
            
            document.getElementById('gridResult').innerHTML = result;
            
            // Сохраняем для экспорта
            window.lastGridData = { levels: levelsData, gridSL, direction };
        }

        // ЭКСПОРТ В .SET ФАЙЛ
        function exportToSet() {
            if (!window.lastGridData) {
                alert('Сначала рассчитайте сетку!');
                return;
            }
            
            const data = window.lastGridData;
            const magic = 20240528;
            const direction = data.direction === 'BUY' ? 'ORDER_TYPE_BUY' : 'ORDER_TYPE_SELL';
            
            let content = `InpMagic=${magic}\n`;
            content += `InpDirection=${direction}\n`;
            content += `InpTotalLevels=${data.levels.length}\n`;
            
            data.levels.forEach((lvl, i) => {
                const n = i + 1;
                content += `Price${n}=${lvl.price}\n`;
                content += `Lot${n}=${lvl.lot}\n`;
                content += `SL${n}=${data.gridSL}\n`;
                content += `TP${n}=${lvl.tp || data.gridSL}\n`;
            });
            
            // Скачивание файла
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'GridBot_Settings.set';
            a.click();
            URL.revokeObjectURL(url);
            
            alert('Файл GridBot_Settings.set скачан!');
        }

        // Инициализация: добавляем 3 уровня по умолчанию
        window.onload = function() {
            for (let i = 0; i < 3; i++) addGridLevel();
        };
    </script>
</body>
</html>
